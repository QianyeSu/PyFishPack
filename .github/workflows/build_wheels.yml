name: Build wheels

on:
  push:
    branches: [dev, main]
    tags: ["v*"]
  pull_request:
    branches: [dev, main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheel ${{ matrix.python }}-${{ matrix.platform[1] }}
    runs-on: ${{ matrix.platform[0] }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - [ubuntu-latest, manylinux_x86_64]
          - [macos-15, macosx_arm64]
          - [macos-15-intel, macosx_x86_64]
          - [windows-2022, win_amd64]
        python: ["cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Linux build deps
        if: startsWith(matrix.platform[1], 'manylinux')
        run: |
          echo "CIBW_MANYLINUX_X86_64_IMAGE=manylinux_2_28" >> "$GITHUB_ENV"

      - name: Setup macOS toolchain
        if: startsWith(matrix.platform[0], 'macos')
        shell: bash
        run: |
          set -euxo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew list gcc >/dev/null 2>&1 || brew install gcc

          GCC_PREFIX="$(brew --prefix gcc)"
          GCC_BIN_DIR="${GCC_PREFIX}/bin"
          CC_BIN="$(compgen -G "${GCC_BIN_DIR}/gcc-[0-9]*" | sort -V | tail -1)"
          CXX_BIN="$(compgen -G "${GCC_BIN_DIR}/g++-[0-9]*" | sort -V | tail -1)"
          FC_BIN="$(compgen -G "${GCC_BIN_DIR}/gfortran-[0-9]*" | sort -V | tail -1)"

          test -n "${CC_BIN}"
          test -n "${CXX_BIN}"
          test -n "${FC_BIN}"

          echo "${GCC_BIN_DIR}" >> "$GITHUB_PATH"
          echo "MACOS_CC=${CC_BIN}" >> "$GITHUB_ENV"
          echo "MACOS_CXX=${CXX_BIN}" >> "$GITHUB_ENV"
          echo "MACOS_FC=${FC_BIN}" >> "$GITHUB_ENV"
          echo "MACOS_F77=${FC_BIN}" >> "$GITHUB_ENV"
          echo "MACOS_F90=${FC_BIN}" >> "$GITHUB_ENV"

      - name: Setup Windows MSYS2
        if: matrix.platform[1] == 'win_amd64'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-pkgconf

      - name: Expose Windows toolchain
        if: matrix.platform[1] == 'win_amd64'
        shell: pwsh
        run: |
          function Resolve-MsysTool([string]$name) {
            $candidates = @(
              (Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin\$name.exe"),
              "D:\a\_temp\msys64\mingw64\bin\$name.exe",
              "C:\msys64\mingw64\bin\$name.exe"
            )
            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                return (Resolve-Path $candidate).Path
              }
            }
            throw "Could not resolve MSYS2 tool: $name.exe"
          }

          $gcc = Resolve-MsysTool "gcc"
          $gxx = Resolve-MsysTool "g++"
          $gfortran = Resolve-MsysTool "gfortran"
          $pkgConfig = Resolve-MsysTool "pkg-config"
          $mingwBin = Split-Path $gcc -Parent

          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MSYS2_CC=$($gcc -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_CXX=$($gxx -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_FC=$($gfortran -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_F77=$($gfortran -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_F90=$($gfortran -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_PKG_CONFIG=$($pkgConfig -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          pip install delvewheel

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform[1] }}
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_COMMAND: python -c "import PyFishPack; print(PyFishPack.__version__)"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BEFORE_BUILD: python -m pip install meson ninja
          CIBW_ENVIRONMENT_LINUX: FC=gfortran F77=gfortran F90=gfortran CC=gcc
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0 FC=${{ env.MACOS_FC }} F77=${{ env.MACOS_F77 }} F90=${{ env.MACOS_F90 }} CC=${{ env.MACOS_CC }} CXX=${{ env.MACOS_CXX }}
          CIBW_ENVIRONMENT_WINDOWS: FC=${{ env.MSYS2_FC }} F77=${{ env.MSYS2_F77 }} F90=${{ env.MSYS2_F90 }} CC=${{ env.MSYS2_CC }} CXX=${{ env.MSYS2_CXX }} PKG_CONFIG=${{ env.MSYS2_PKG_CONFIG }}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: delvewheel repair -w {dest_dir} {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.platform[1] }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'release' && github.event.action == 'published')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: dist-artifacts
          merge-multiple: true

      - name: Prepare dist directory
        run: |
          mkdir -p dist
          find dist-artifacts -name "*.whl" -exec cp {} dist/ \;
          find dist-artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          ls -la dist/

      - name: Check whether this version is already on PyPI
        id: pypi_check
        shell: bash
        run: |
          set -euo pipefail
          version="$(
            python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          status_code="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              "https://pypi.org/pypi/PyFishPack/${version}/json"
          )"

          case "$status_code" in
            200)
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              echo "PyPI already has PyFishPack ${version}; skipping publish."
              ;;
            404)
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
              echo "PyPI does not have PyFishPack ${version}; continuing publish."
              ;;
            *)
              echo "Unexpected response from PyPI for PyFishPack ${version}: HTTP ${status_code}" >&2
              exit 1
              ;;
          esac

      - name: Report skipped publish
        if: steps.pypi_check.outputs.should_publish != 'true'
        shell: bash
        run: |
          echo "Skipping PyPI publish because PyFishPack ${{ steps.pypi_check.outputs.version }} already exists."

      - name: Publish to PyPI
        if: steps.pypi_check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
